name: CI

# SEC-11: every third-party action is pinned to a full commit SHA. Mutable
# `@v4` tags can be silently re-pointed by an attacker who compromises the
# action's repo, so pinning to a specific SHA is the only durable defence.
# Dependabot (.github/dependabot.yml) bumps these SHAs on a monthly cadence
# so we get security patches without having to remember to look.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  placeholder-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Fail if REPLACE_WITH_ placeholders remain
        run: |
          # SEC-3: the wrangler.toml `[env.preview]` blocks legitimately
          # contain REPLACE_WITH_PREVIEW_*_ID placeholders until the user
          # provisions the preview resources. Don't fail CI on those —
          # they're an intentional fail-safe for the preview env.
          if git grep -n 'REPLACE_WITH_' -- ':!docs/' ':!.archive/' ':!.github/' ':!apps/api/wrangler.toml' ':!apps/ingest/wrangler.toml' ':!apps/og/wrangler.toml'; then
            echo "::error::Unfilled REPLACE_WITH_ placeholders detected"
            exit 1
          fi

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm -r typecheck
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Run all tests
        run: pnpm -r test

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
