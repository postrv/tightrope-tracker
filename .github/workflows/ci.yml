name: CI

# SEC-11: every third-party action is pinned to a full commit SHA. Mutable
# `@v4` tags can be silently re-pointed by an attacker who compromises the
# action's repo, so pinning to a specific SHA is the only durable defence.
# Dependabot (.github/dependabot.yml) bumps these SHAs on a monthly cadence
# so we get security patches without having to remember to look.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  placeholder-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Fail if REPLACE_WITH_ placeholders remain
        run: |
          # SEC-3: the wrangler.toml `[env.preview]` blocks legitimately
          # contain REPLACE_WITH_PREVIEW_*_ID placeholders until the user
          # provisions the preview resources — they're an intentional
          # fail-safe for the preview env. Encode that POLICY rather than a
          # per-file exclusion list: the old list named api/ingest/og and
          # silently went stale when the curator worker gained the same
          # [env.preview] block (CI red from 2026-07-08 until this fix).
          #
          # Rule 1: any placeholder that is NOT the sanctioned preview kind fails.
          bad=$(git grep -n 'REPLACE_WITH_' -- ':!docs/' ':!.archive/' ':!.github/' | grep -v 'REPLACE_WITH_PREVIEW_' || true)
          if [ -n "$bad" ]; then
            echo "$bad"
            echo "::error::Unfilled REPLACE_WITH_ placeholders detected"
            exit 1
          fi
          # Rule 2: the preview kind is sanctioned ONLY inside a worker's
          # wrangler.toml — anywhere else it's a placeholder that escaped.
          stray=$(git grep -n 'REPLACE_WITH_PREVIEW_' -- ':!docs/' ':!.archive/' ':!.github/' ':!apps/*/wrangler.toml' || true)
          if [ -n "$stray" ]; then
            echo "$stray"
            echo "::error::REPLACE_WITH_PREVIEW_ placeholder outside a worker wrangler.toml"
            exit 1
          fi

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm -r typecheck
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Run all tests
        run: pnpm -r test

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
