name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  placeholder-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if REPLACE_WITH_ placeholders remain
        run: |
          if git grep -n 'REPLACE_WITH_' -- ':!docs/' ':!.archive/' ':!.github/'; then
            echo "::error::Unfilled REPLACE_WITH_ placeholders detected"
            exit 1
          fi

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Run all tests
        run: pnpm -r test

      - name: Build
        run: pnpm build
