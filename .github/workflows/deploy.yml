name: Deploy

# SEC-11: every third-party action is pinned to a full commit SHA. Mutable
# `@v4` tags can be silently re-pointed by an attacker who compromises the
# action's repo, so pinning to a specific SHA is the only durable defence.
# Dependabot (.github/dependabot.yml) bumps these SHAs monthly.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: "Skip D1 migrations"
        required: false
        default: "false"

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  migrate:
    name: Apply D1 migrations
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.skip_migrations != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations to production D1
        run: pnpm db:migrate:remote

  snapshot:
    name: Publish nightly public snapshot
    runs-on: ubuntu-latest
    environment: production
    needs: [migrate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Export current D1 snapshot to /data-snapshots
        run: |
          mkdir -p data-snapshots
          cd apps/api
          pnpm wrangler d1 export tightrope_db --remote --output=../../data-snapshots/$(date -u +%Y-%m-%d).sql
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapshot
          path: data-snapshots/

  deploy-api:
    runs-on: ubuntu-latest
    environment: production
    needs: [migrate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Deploy API worker
        run: pnpm --filter @tightrope/api run deploy

  deploy-og:
    runs-on: ubuntu-latest
    environment: production
    needs: [migrate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Deploy OG worker
        run: pnpm --filter @tightrope/og run deploy

  deploy-ingest:
    runs-on: ubuntu-latest
    environment: production
    needs: [migrate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Deploy ingest worker
        run: pnpm --filter @tightrope/ingest run deploy

  deploy-web:
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-api, deploy-og, deploy-ingest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm --filter @tightrope/web build
      - name: Deploy web to Cloudflare Pages
        run: pnpm --filter @tightrope/web run deploy
