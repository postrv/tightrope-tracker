name = "tightrope-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Public JSON API + MP postcode lookup.
# Mounted at api.tightropetracker.uk in production.
routes = [
  { pattern = "api.tightropetracker.uk/*", zone_name = "tightropetracker.uk" }
]

[[d1_databases]]
binding = "DB"
database_name = "tightrope_db"
database_id = "REPLACE_WITH_PROD_D1_ID"
migrations_dir = "../../db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_PROD_KV_ID"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "tightrope-archive"

[vars]
ENVIRONMENT = "production"
# Parliament Members API -- public, no key required.
PARLIAMENT_API_BASE = "https://members-api.parliament.uk/api"

[observability]
enabled = true

[placement]
mode = "smart"

[limits]
cpu_ms = 200

[[env.preview]]
# placeholder for preview env overrides
