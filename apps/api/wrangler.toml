name = "tightrope-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# SEC-3: top-level bindings below point at PRODUCTION D1 / KV / R2. Local
# development uses miniflare (`wrangler dev` without --remote) and never
# touches them. `wrangler dev --remote` and `wrangler deploy` DO use these
# prod bindings. To run remote-bound work safely, use the `[env.preview]`
# environment defined further down (run with `--env preview`); it points
# at separate preview resources that you must provision once via:
#   wrangler d1 create        tightrope_db_preview
#   wrangler kv:namespace create KV --env preview
#   wrangler r2 bucket create  tightrope-archive-preview
# then paste the resulting IDs into the [env.preview.*] sections.

# Public JSON API + MP postcode lookup.
# Mounted at api.tightropetracker.uk in production via a Workers Custom Domain
# (auto-provisions the DNS record in the Cloudflare zone).
routes = [
  { pattern = "api.tightropetracker.uk", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "tightrope_db"
database_id = "849aed27-56e2-40c2-aa64-a74bf50e8a63"
migrations_dir = "../../db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "ef945a9ece9843af8883df16be6676d7"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "tightrope-archive"

[vars]
ENVIRONMENT = "production"
# Parliament Members API -- public, no key required.
PARLIAMENT_API_BASE = "https://members-api.parliament.uk/api"

# LFG signup proxy (POST /api/v1/lfg-signup) — secrets uploaded via
# `wrangler secret put`, NOT stored in this file. Required:
#   wrangler secret put LFG_API_KEY                  # Brevo direct-API key (primary path)
#   wrangler secret put BREVO_LIST_NUMBER            # general LFG signup list ID (e.g. 127)
#   wrangler secret put BREVO_WEEKLY_LIST_NUMBER     # weekly digest list ID (e.g. 128)
#   wrangler secret put TURNSTILE_SECRET_KEY         # Cloudflare Turnstile secret
#   wrangler secret put LFG_SIGNUP_API_URL           # Zapier webhook (fallback only — leave unset to use Brevo direct)
# For local development copy `.dev.vars.example` to `.dev.vars`.

[observability]
enabled = true

[placement]
mode = "smart"

[limits]
cpu_ms = 200

# --- Preview environment (SEC-3) -----------------------------------------
# Activated by `wrangler dev --remote --env preview` or `wrangler deploy
# --env preview`. Bindings here MUST point at separate resources from the
# production block above; otherwise the whole point (isolation) is lost.
# Until preview resources are provisioned the placeholder IDs below will
# cause wrangler to error out — that is the intended fail-safe.

[env.preview]
name = "tightrope-api-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
PARLIAMENT_API_BASE = "https://members-api.parliament.uk/api"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "tightrope_db_preview"
database_id = "REPLACE_WITH_PREVIEW_D1_ID"
migrations_dir = "../../db/migrations"

[[env.preview.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_PREVIEW_KV_ID"

[[env.preview.r2_buckets]]
binding = "ARCHIVE"
bucket_name = "tightrope-archive-preview"
