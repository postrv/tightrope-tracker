name = "tightrope-curator"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# AI curation worker: captures, extracts, verifies, and (where allowed)
# publishes the non-API data sources that were previously hand-refreshed
# fixtures. See docs/AUTOMATION_PLAN.md Phase 3 for the design contract.
#
# Deliberately a separate worker from tightrope-ingest: isolates the AI
# binding and its latency from the deterministic 5-minute ingest loop, and
# a curator bug can never take down market ingestion.
#
# TODO(deploy): add a custom-domain route (e.g. curator.tightropetracker.uk)
# once the review endpoints are implemented; workers.dev is fine for shadow
# mode.

# Shared PRODUCTION resources — same ids as apps/ingest/wrangler.toml.
# Local dev uses miniflare and never touches them (SEC-3 discipline applies:
# use --env preview for any remote-bound work).

[[d1_databases]]
binding = "DB"
database_name = "tightrope_db"
database_id = "849aed27-56e2-40c2-aa64-a74bf50e8a63"
migrations_dir = "../../db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "ef945a9ece9843af8883df16be6676d7"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "tightrope-archive"

[ai]
binding = "AI"

# NOTE: no [browser] binding yet — Browser Rendering is a fallback for
# JS-gated sources only. Add it if (and only if) a CaptureSpec proves to
# need it. See AUTOMATION_PLAN.md Phase 3.

[triggers]
# All schedules are >= 1h apart, so scheduled invocations get the long CPU
# allowance on the paid plan. Keep in sync with CRON_BRANCHES in
# src/index.ts — mirror the ingest worker's assertion test.
crons = [
  "0 5 * * 2",    # pre-deadline sweep (Tuesday)
  "0 5 * * 3",    # pre-deadline sweep (Wednesday)
  "30 6 * * 2",   # editorial readiness digest (Tuesday)
  "30 6 * * 3",   # editorial readiness digest (Wednesday)
  "0 6 * * *",    # daily change-detection poll + heartbeat
  "0 7 * * *"     # staleness monitor (cadence-state evaluation + alerts)
]

[vars]
ENVIRONMENT = "production"
# SHADOW MODE DEFAULT ON (AUTOMATION_PLAN Phase 5). While "shadow", every
# capture is verified + recorded but NOTHING is published. Flip to "live" only
# after the 2-cycle shadow comparison signs a source off. Kept as a plain var
# (not a secret) so the current mode is auditable in the committed config.
CURATOR_MODE = "shadow"
# Approve-path base URL for delivery-commitment patches (AUTOMATION_PLAN 1.3).
INGEST_ADMIN_URL = "https://ingest.tightropetracker.uk"
# secrets (wrangler secret put <NAME>, never committed):
#   ADMIN_TOKEN         -- review endpoints; generate fresh, do NOT reuse ingest's
#   INGEST_ADMIN_TOKEN  -- ingest /admin token for the approve path
#   ALERT_WEBHOOK_URL   -- same webhook as ingest
#   HEARTBEAT_URL       -- dead-man switch ping (AUTOMATION_PLAN 2.3)

[observability]
enabled = true

[placement]
mode = "smart"

[limits]
# I/O-dominated (fetches + AI calls don't count toward CPU); tune after
# shadow mode if the sweep ever approaches it.
cpu_ms = 60000

# --- Preview environment ---------------------------------------------------
# Mirror of the ingest preview pattern; provision preview resources and
# paste ids before any remote-bound testing. No crons in preview.

[env.preview]
name = "tightrope-curator-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
CURATOR_MODE = "shadow"
INGEST_ADMIN_URL = "https://tightrope-ingest-preview.workers.dev"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "tightrope_db_preview"
database_id = "REPLACE_WITH_PREVIEW_D1_ID"
migrations_dir = "../../db/migrations"

[[env.preview.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_PREVIEW_KV_ID"

[[env.preview.r2_buckets]]
binding = "ARCHIVE"
bucket_name = "tightrope-archive-preview"

[env.preview.ai]
binding = "AI"
