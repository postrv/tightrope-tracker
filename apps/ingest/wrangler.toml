name = "tightrope-ingest"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# SEC-3: top-level bindings point at PRODUCTION D1 / KV / R2 / DLQ queue.
# Local dev uses miniflare and never touches them. `--remote` and
# `wrangler deploy` do — use `--env preview` (block at the bottom) for
# any remote-bound work so writes go to the preview-isolated resources.

# Scheduled data ingestion + score recompute. Exposed at
# ingest.tightropetracker.uk solely for the /admin/run and /__healthz
# endpoints. /admin/run is guarded by a shared ADMIN_TOKEN and requires
# POST; everything else on the host returns 405.
routes = [
  { pattern = "ingest.tightropetracker.uk", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "tightrope_db"
database_id = "849aed27-56e2-40c2-aa64-a74bf50e8a63"
migrations_dir = "../../db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "ef945a9ece9843af8883df16be6676d7"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "tightrope-archive"

[[queues.producers]]
binding = "DLQ"
queue = "tightrope-ingest-dlq"

[[queues.consumers]]
queue = "tightrope-ingest-dlq"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

[triggers]
# Market ingest: every 5 minutes -- Worker checks time-of-day and throttles itself out of market hours.
# Fiscal, Labour, Delivery: daily cascade starting 02:00 UTC.
# Recompute: every 5 minutes.
crons = [
  "*/5 * * * *",       # ingest-market + recompute-scores
  "0 2 * * *",         # ingest-fiscal
  "15 2 * * *",        # ingest-labour
  "30 2 * * *"         # ingest-delivery
]

[vars]
ENVIRONMENT = "production"
# secret required: ADMIN_TOKEN -- shared token for POST /admin/run?source=...
# set via `wrangler secret put ADMIN_TOKEN` (do NOT commit to this file).
# optional: EODHD_API_KEY -- free-tier API key for daily housebuilder EOD closes.
# set via `wrangler secret put EODHD_API_KEY` from apps/ingest/.
# Without it the adapter falls back to the editorial fixture.
# deprecated: TWELVE_DATA_KEY -- free tier does not support LSE equities.

[observability]
enabled = true

[placement]
mode = "smart"

[limits]
cpu_ms = 30000

# --- Preview environment (SEC-3) -----------------------------------------
# Run with `--env preview` for any remote-bound dev/deploy. Provision via:
#   wrangler d1 create        tightrope_db_preview
#   wrangler kv:namespace create KV --env preview
#   wrangler r2 bucket create  tightrope-archive-preview
#   wrangler queues create     tightrope-ingest-dlq-preview
# then paste IDs below. Unfilled placeholders cause wrangler to error
# (intended fail-safe).

[env.preview]
name = "tightrope-ingest-preview"
# No cron triggers in preview — accidental scheduled writes against the
# production fiscal sources would still be wrong even with isolated D1.

[env.preview.vars]
ENVIRONMENT = "preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "tightrope_db_preview"
database_id = "REPLACE_WITH_PREVIEW_D1_ID"
migrations_dir = "../../db/migrations"

[[env.preview.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_PREVIEW_KV_ID"

[[env.preview.r2_buckets]]
binding = "ARCHIVE"
bucket_name = "tightrope-archive-preview"

[[env.preview.queues.producers]]
binding = "DLQ"
queue = "tightrope-ingest-dlq-preview"

[[env.preview.queues.consumers]]
queue = "tightrope-ingest-dlq-preview"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
