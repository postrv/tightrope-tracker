name = "tightrope-og"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Bundle workers-og's pre-compiled yoga + resvg wasm blobs as WebAssembly
# modules. workers-og imports each .wasm via `import mod from "./x.wasm"`, and
# this rule makes wrangler resolve those to `WebAssembly.Module` values so the
# runtime never calls the embedder-forbidden `WebAssembly.instantiate(bytes)`
# path (the old satori/standalone + @cf-wasm/resvg pipeline tripped that ban).
rules = [
  { type = "CompiledWasm", globs = ["**/*.wasm"], fallthrough = true },
]

# Share-card image generation. Mounted at og.tightropetracker.uk via a
# Workers Custom Domain (auto-provisions the DNS record in the zone).
routes = [
  { pattern = "og.tightropetracker.uk", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "tightrope_db"
database_id = "849aed27-56e2-40c2-aa64-a74bf50e8a63"

[[kv_namespaces]]
binding = "KV"
id = "ef945a9ece9843af8883df16be6676d7"

[[r2_buckets]]
binding = "FONTS"
bucket_name = "tightrope-og-fonts"

[vars]
ENVIRONMENT = "production"

[observability]
enabled = true

[placement]
mode = "smart"

# Hard CPU cap: a secondary abuse guard beneath the 8s wall-clock timeout in
# lib/render.ts. A real satori-layout + resvg-rasterise render of a 1200x630
# card measures several hundred ms of CPU (fonts are memoised at module scope,
# so warm renders are almost entirely satori/resvg CPU), and the cold-start
# path additionally parses the woff faces and instantiates the yoga/resvg wasm.
# The previous 50ms (the Workers Bundled default) predates a working render
# pipeline and would kill every legitimate render on the platform; 5s leaves
# generous headroom for cold starts while still bounding a runaway layout,
# which the wall-clock timeout catches first regardless.
[limits]
cpu_ms = 5000

# --- Preview environment (SEC-3) -----------------------------------------
# Top-level bindings point at PROD. Use `--env preview` for any remote-bound
# dev so writes go to isolated preview resources. Provision via:
#   wrangler d1 create        tightrope_db_preview
#   wrangler kv:namespace create KV --env preview
# (FONTS R2 is read-only and safe to share with prod.)

[env.preview]
name = "tightrope-og-preview"

[env.preview.vars]
ENVIRONMENT = "preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "tightrope_db_preview"
database_id = "REPLACE_WITH_PREVIEW_D1_ID"

[[env.preview.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_PREVIEW_KV_ID"

[[env.preview.r2_buckets]]
binding = "FONTS"
bucket_name = "tightrope-og-fonts"
