name = "tightrope-web"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "tightrope_db"
database_id = "REPLACE_WITH_PROD_D1_ID"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_PROD_KV_ID"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "tightrope-archive"

[vars]
ENVIRONMENT = "production"

# Preview environment (used by `wrangler pages dev`).
[env.preview]
name = "tightrope-web-preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "tightrope_db"
database_id = "REPLACE_WITH_PREVIEW_D1_ID"

[[env.preview.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_PREVIEW_KV_ID"

[[env.preview.r2_buckets]]
binding = "ARCHIVE"
bucket_name = "tightrope-archive-preview"
